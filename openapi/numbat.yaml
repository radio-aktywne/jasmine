components:
  schemas:
    DeleteRequestEvent:
      type: string
      format: uuid
    DeleteRequestStart:
      type: string
      format: date-time
      examples:
        - 2000-01-01T00:00:00
    DownloadRequestEvent:
      type: string
      format: uuid
    DownloadRequestStart:
      type: string
      format: date-time
      examples:
        - 2000-01-01T00:00:00
    EventType:
      type: string
      enum:
        - test
      title: EventType
      description: Event types.
    HeadDownloadRequestEvent:
      type: string
      format: uuid
    HeadDownloadRequestStart:
      type: string
      format: date-time
      examples:
        - 2000-01-01T00:00:00
    ListOrder:
      type: string
      enum:
        - asc
        - desc
      title: ListOrder
      description: Order to list prerecordings.
    ListRequestAfter:
      anyOf:
        - $ref: "#/components/schemas/NaiveDatetime"
        - type: "null"
    ListRequestBefore:
      anyOf:
        - $ref: "#/components/schemas/NaiveDatetime"
        - type: "null"
    ListRequestEvent:
      type: string
      format: uuid
    ListRequestLimit:
      anyOf:
        - type: integer
        - type: "null"
    ListRequestOffset:
      anyOf:
        - type: integer
        - type: "null"
    ListRequestOrder:
      anyOf:
        - $ref: "#/components/schemas/ListOrder"
        - type: "null"
    ListResponseResults:
      properties:
        count:
          type: integer
          title: Count
          description: Total number of prerecordings that match the request.
        limit:
          anyOf:
            - type: integer
            - type: "null"
          title: Limit
          description: Maximum number of returned prerecordings.
        offset:
          anyOf:
            - type: integer
            - type: "null"
          title: Offset
          description: Number of skipped prerecordings.
        prerecordings:
          items:
            $ref: "#/components/schemas/Prerecording"
          type: array
          title: Prerecordings
          description: List of prerecordings.
      type: object
      required:
        - count
        - limit
        - offset
        - prerecordings
      title: PrerecordingList
      description: List of prerecordings.
    NaiveDatetime:
      type: string
      format: date-time
      examples:
        - 2000-01-01T00:00:00
    Parameters:
      properties:
        message:
          anyOf:
            - type: string
            - type: "null"
          title: Message
          description: Optional message to include in the test.
          default: null
      type: object
      title: Parameters
      description: Parameters for testing.
    Prerecording:
      properties:
        event:
          type: string
          format: uuid
          title: Event
          description: Identifier of the event.
        start:
          $ref: "#/components/schemas/NaiveDatetime"
      type: object
      required:
        - event
        - start
      title: Prerecording
      description: Prerecording data.
    SubscribeRequestTypes:
      anyOf:
        - type: string
        - items:
            $ref: "#/components/schemas/EventType"
          type: array
          uniqueItems: true
        - type: "null"
    TestRequestParameters:
      anyOf:
        - $ref: "#/components/schemas/Parameters"
        - type: "null"
    TestResponseResult:
      properties:
        success:
          type: boolean
          title: Success
          description: Indicates if the test was successful.
        message:
          type: string
          title: Message
          description: Message returned from the test.
      type: object
      required:
        - success
        - message
      title: Result
      description: Result of the test.
    UploadRequestEvent:
      type: string
      format: uuid
    UploadRequestStart:
      type: string
      format: date-time
      examples:
        - 2000-01-01T00:00:00
    UploadRequestType:
      type: string
